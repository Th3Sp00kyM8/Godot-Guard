name: Godot Guard Code Scanning

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  godot-guard:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx godot-guard scan . --format sarif --fail-on none --output godot-guard.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: godot-guard.sarif
