name: Bug report
description: Report a Godot Guard crash, incorrect result, or confusing output.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
      placeholder: Godot Guard reported a missing resource that actually exists.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Godot Guard version
      placeholder: "0.1.9"
    validations:
      required: true
  - type: input
    id: godot
    attributes:
      label: Godot version
      placeholder: "4.3, 4.4, 4.5, 4.6..."
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the exact command you ran.
      render: shell
      placeholder: npx godot-guard scan . --format markdown
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the relevant output. Remove private paths, private code, and secrets.
      render: text
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Include anything else that would help reproduce or understand the problem.
